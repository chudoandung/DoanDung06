{% extends 'base.html' %}

{% block title %}{{ movie.title }} - Chi tiết{% endblock %}

{% block content %}
<div class="row pt-4">
    <div class="col-md-4 mb-4">
        <img src="{{ movie.image }}" class="img-fluid rounded shadow-lg border border-secondary" alt="{{ movie.title }}" style="width: 100%; max-height: 550px; object-fit: cover;">
    </div>
    <div class="col-md-8">
        <h1 class="display-4 fw-bold text-white">{{ movie.title }}</h1>
        <span class="badge bg-danger fs-6 my-3 px-3 py-2">{{ movie.genre }}</span>
        
        <div class="mt-4 p-4 bg-secondary bg-opacity-25 rounded border border-secondary">
            <h3 class="text-danger fw-bold mb-3">Mô tả phim</h3>
            <p class="lead text-light" style="font-size: 1.1rem; line-height: 1.8;">{{ movie.desc }}</p>
        </div>

        <div class="mt-5 d-flex gap-3">
            <a href="/" class="btn btn-secondary px-4 py-2">← Quay lại Trang chủ</a>
            <button class="btn btn-danger px-5 py-2 fw-bold" onclick="alert('Tính năng xem phim đang được phát triển!')">XEM NGAY</button>
        </div>
    </div>
</div>
{% endblock %}
